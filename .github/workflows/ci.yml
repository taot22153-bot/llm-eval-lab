name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: mysql+pymysql://root:test-root@127.0.0.1:3306/llm_eval_lab_test
      TEST_DATABASE_URL: mysql+pymysql://root:test-root@127.0.0.1:3306/llm_eval_lab_test
      CORS_ORIGINS: http://localhost:5173
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: test-root
          MYSQL_DATABASE: llm_eval_lab_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ptest-root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend
        run: python -m pip install -e './backend[dev]'
      - name: Lint backend
        run: python -m ruff check backend
      - name: Test backend
        run: python -m pytest backend/tests -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend
        run: npm --prefix frontend ci
      - name: Test frontend
        run: npm --prefix frontend test
      - name: Build frontend
        run: npm --prefix frontend run build
